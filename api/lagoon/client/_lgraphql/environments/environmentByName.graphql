query (
  $name: String!,
  $project: Int!
){
  environmentByName(
    name: $name,
    project: $project
  ){
    id
    name
    route
    routes
    deployType
    environmentType
    openshiftProjectName
    autoIdle
    deployTitle
    deployBaseRef
    deployHeadRef
    updated
    created
    deleted
    services{
      id
      name
      type
      containers{
        name
      }
      created
      updated
    }
  }
}
